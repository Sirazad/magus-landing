<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sirazad</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fff;
      color: #111;
    }

    header {
      background: #1a9a9a;
      color: #fff;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    header p {
      font-size: 0.9rem;
      margin-top: 0.2rem;
    }

    #lang-toggle {
      background: transparent;
      border: 1px solid #fff;
      color: #fff;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    #lang-toggle:hover {
      background: rgba(255,255,255,0.15);
    }

    .header-text {
      flex: 1;
    }

    main {
      padding: 1.5rem;
    }

    main h2 {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #ccc;
      padding-bottom: 0.4rem;
      margin-bottom: 1rem;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    .card {
      border: 1px solid #ccc;
      background: #fff;
      padding: 1rem;
    }

    a.card {
      display: block;
      color: inherit;
      text-decoration: none;
    }

    a.card:hover {
      border-color: #1a9a9a;
    }

    .card-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #555;
      margin-bottom: 0.25rem;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
    }

    .card.disabled {
      opacity: 0.45;
      cursor: default;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-text">
      <h1 data-i18n="site-title">Sirazad</h1>
      <p data-i18n="subtitle">Eszközök és segédletek</p>
    </div>
    <button id="lang-toggle">EN</button>
  </header>

  <main>
    <h2 data-i18n="services-heading">Szolgáltatások</h2>
    <div class="card-grid">

      <a class="card" href="https://inventory.sirazad.com">
        <div class="card-label">app</div>
        <div class="card-title" data-i18n="card.inventory">Leltár</div>
      </a>

      <div class="card disabled">
        <div class="card-label">—</div>
        <div class="card-title" data-i18n="card.soon.1">Hamarosan...</div>
      </div>

      <div class="card disabled">
        <div class="card-label">—</div>
        <div class="card-title" data-i18n="card.soon.2">Hamarosan...</div>
      </div>

    </div>
  </main>

  <script>
    const i18n = {
      hu: {
        'site-title':        'Sirazad',
        'subtitle':          'Eszközök és segédletek',
        'services-heading':  'Szolgáltatások',
        'card.inventory':    'Leltár',
        'card.soon.1':       'Hamarosan...',
        'card.soon.2':       'Hamarosan...'
      },
      en: {
        'site-title':        'Sirazad',
        'subtitle':          'Tools and references',
        'services-heading':  'Services',
        'card.inventory':    'Inventory',
        'card.soon.1':       'Coming soon...',
        'card.soon.2':       'Coming soon...'
      }
    };

    function setLang(lang) {
      if (!i18n[lang]) lang = 'hu';
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n]').forEach(function(el) {
        var key = el.getAttribute('data-i18n');
        if (i18n[lang][key] !== undefined) {
          el.textContent = i18n[lang][key];
        }
      });
      document.getElementById('lang-toggle').textContent = lang === 'hu' ? 'EN' : 'HU';
      localStorage.setItem('lang', lang);
    }

    document.getElementById('lang-toggle').addEventListener('click', function() {
      var current = localStorage.getItem('lang') || 'hu';
      setLang(current === 'hu' ? 'en' : 'hu');
    });

    document.addEventListener('DOMContentLoaded', function() {
      setLang(localStorage.getItem('lang') || 'hu');
    });
  </script>
</body>
</html>
